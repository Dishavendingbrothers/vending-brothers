<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vending Brothers – Download App</title>
  <link href="https://fonts.googleapis.com/css2?family=Cooper+Hewitt:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(30,60,30,0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(15,40,15,0.4) 0%, transparent 60%),
        #0d0d0d;
      z-index: 0;
    }

    .dots {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      padding: 48px 40px 44px;
      max-width: 380px;
      width: 92%;
      text-align: center;
      backdrop-filter: blur(24px);
      animation: fadeUp 0.55s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      width: 120px;
      height: 80px;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
    }

    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.42);
      margin-bottom: 32px;
      line-height: 1.6;
      font-weight: 400;
    }

    .detecting {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
    }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
      margin-bottom: 11px;
      letter-spacing: 0.01em;
    }

    .btn:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn:active { transform: scale(0.97); }

    .btn-android {
      background: linear-gradient(135deg, #22c55e, #15803d);
      color: #fff;
      box-shadow: 0 6px 20px rgba(34,197,94,0.22);
    }

    .btn-ios {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff;
      box-shadow: 0 6px 20px rgba(59,130,246,0.22);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.09);
      font-size: 13px;
      font-weight: 600;
      padding: 12px 20px;
      box-shadow: none;
    }

    .divider {
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      margin: 18px 0 14px;
      position: relative;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 36%;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 99px;
      margin-bottom: 7px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge-android { background: rgba(34,197,94,0.14); color: #4ade80; }
    .badge-ios     { background: rgba(59,130,246,0.14); color: #93c5fd; }

    #main-btn { display: none; }
    #fallback  { display: none; }
  </style>
</head>
